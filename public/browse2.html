<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="theme-color" content="#f2f2f7"/>
<title>Droboard — Browse</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
/* ═══════════════════════════
   CSS VARIABLES
═══════════════════════════ */
:root{
  --acc:       #ff0050;
  --acc2:      #ff4070;
  --acc-light: rgba(255,0,80,.08);
  --acc-mid:   rgba(255,0,80,.14);
  --glow:      rgba(255,0,80,.22);

  --bg:        #f2f2f7;
  --bg2:       #e8e8ef;
  --card:      #ffffff;
  --card2:     #f7f7fb;
  --surface:   #ebebf0;

  --tx:        #1a1a2e;
  --tx2:       #3a3a52;
  --muted:     #8e8ea0;
  --muted2:    #b0b0c0;

  --bd:        rgba(0,0,0,.08);
  --bd2:       rgba(0,0,0,.05);

  --radius:    14px;
  --radius-sm: 9px;
  --px:        14px;
  --gap:       10px;

  --safe-b:    env(safe-area-inset-bottom,14px);
  --font-d:    'Playfair Display',serif;
  --font-b:    'DM Sans',sans-serif;
}

/* ═══════════════════════════
   RESET
═══════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--font-b);overflow:hidden}
img{display:block;user-select:none}
a{color:inherit;text-decoration:none}
button{font-family:var(--font-b);cursor:pointer;border:none}

/* ═══════════════════════════
   SHELL
═══════════════════════════ */
.shell{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden}

/* ═══════════════════════════
   TOP BAR
═══════════════════════════ */
.topbar{
  flex-shrink:0;display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;gap:10px;
  padding:10px var(--px) 8px;
  background:var(--card);
  border-bottom:1px solid var(--bd);
  z-index:60;
}
.nav-logo{font-family:var(--font-d);font-size:22px;font-weight:900;color:var(--acc);letter-spacing:-1px;cursor:pointer}
.page-title{display:flex;align-items:center;gap:7px}
.page-title-text{font-family:var(--font-d);font-size:16px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.page-title-badge{font-size:8px;font-weight:800;padding:2px 8px;border-radius:10px;background:var(--acc);color:#fff;flex-shrink:0}
.sort-btn{width:34px;height:34px;border-radius:50%;background:var(--bg);border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted);cursor:pointer;flex-shrink:0;transition:.18s}
.sort-btn.active{background:var(--acc-light);border-color:rgba(255,0,80,.4);color:var(--acc)}

/* ═══════════════════════════
   FILTER BAR (Genre + Feeling combined)
═══════════════════════════ */
.filter-bar{
  flex-shrink:0;
  background:var(--card);
  border-bottom:1px solid var(--bd);
}
.filter-row{display:flex;gap:6px;padding:7px var(--px);overflow-x:auto;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-row + .filter-divider{height:1px;background:var(--bd2);margin:0 var(--px)}
.chip{
  flex-shrink:0;padding:5px 14px;border-radius:20px;
  font-size:11px;font-weight:700;
  border:1.5px solid var(--bd);
  background:var(--bg);color:var(--muted);
  cursor:pointer;transition:all .18s;white-space:nowrap;
}
.chip.active{background:var(--acc);border-color:var(--acc);color:#fff;box-shadow:0 2px 10px var(--glow)}
.chip:active{transform:scale(.95)}
.feel-chip{
  flex-shrink:0;display:flex;align-items:center;gap:4px;
  padding:4px 12px;border-radius:20px;
  font-size:11px;font-weight:700;
  border:1.5px solid var(--bd);
  background:var(--bg);color:var(--muted);
  cursor:pointer;transition:all .18s;white-space:nowrap;
}
.feel-chip.active{background:var(--acc-light);border-color:rgba(255,0,80,.4);color:var(--acc)}

/* ═══════════════════════════
   BODY
═══════════════════════════ */
.body{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;padding-bottom:calc(66px + var(--safe-b) + 16px)}
.body::-webkit-scrollbar{display:none}

/* ═══════════════════════════
   FEATURED BANNER
═══════════════════════════ */
.feat-section{padding:14px var(--px) 0}
.feat-outer{border-radius:var(--radius);overflow:hidden;position:relative;box-shadow:0 4px 20px rgba(0,0,0,.12)}
.feat-track{display:flex;transition:transform .38s cubic-bezier(.4,0,.2,1)}
.feat-slide{
  flex:0 0 100%;height:190px;
  position:relative;background-size:cover;background-position:center 25%;
  cursor:pointer;
}
.feat-slide:active{opacity:.95}
.feat-scrim{position:absolute;inset:0;background:linear-gradient(170deg,rgba(0,0,0,.04) 0%,rgba(0,0,0,.5) 45%,rgba(0,0,0,.95) 100%)}
.feat-top{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;align-items:flex-start}
.feat-cat{background:var(--acc);color:#fff;font-size:8px;font-weight:800;padding:2px 9px;border-radius:8px;letter-spacing:.04em}
.feat-emo{font-size:8px;font-weight:800;padding:2px 8px;border-radius:8px}
.fe-cry{background:rgba(56,130,246,.15);color:#1d4ed8;border:1px solid rgba(56,130,246,.2)}
.fe-fire{background:rgba(234,88,12,.12);color:#c2410c;border:1px solid rgba(234,88,12,.2)}
.fe-heart{background:rgba(236,72,153,.12);color:#be185d;border:1px solid rgba(236,72,153,.2)}
.fe-shock{background:rgba(124,58,237,.12);color:#6d28d9;border:1px solid rgba(124,58,237,.18)}
.feat-body{position:absolute;bottom:0;left:0;right:0;padding:10px 12px 14px}
.feat-title{font-family:var(--font-d);font-size:14px;font-weight:900;line-height:1.3;color:#fff;margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-shadow:0 1px 6px rgba(0,0,0,.4)}
.feat-meta{display:flex;align-items:center;gap:6px}
.feat-av{width:18px;height:18px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(255,255,255,.4)}
.feat-author{font-size:10px;color:rgba(255,255,255,.8);font-weight:700;flex:1}
.feat-stats{display:flex;gap:8px}
.feat-stat{font-size:9px;color:rgba(255,255,255,.6);display:flex;align-items:center;gap:3px;font-weight:600}
.feat-dots{display:flex;gap:4px;justify-content:center;padding:8px 0 2px}
.fdot{width:5px;height:5px;border-radius:50%;background:var(--muted2);cursor:pointer;transition:.25s}
.fdot.on{width:18px;border-radius:3px;background:var(--acc)}

/* ═══════════════════════════
   WRITERS ROW
═══════════════════════════ */
.writers-row{display:flex;gap:8px;padding:0 var(--px) 4px;overflow-x:auto;scrollbar-width:none}
.writers-row::-webkit-scrollbar{display:none}
.wc{flex-shrink:0;width:80px;background:var(--card);border:1.5px solid var(--bd);border-radius:14px;padding:10px 6px 9px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:all .18s;box-shadow:0 1px 5px rgba(0,0,0,.05)}
.wc:hover{border-color:rgba(255,0,80,.3);box-shadow:0 2px 10px rgba(255,0,80,.1)}
.wc:active{transform:scale(.97)}
.wc-ring-wrap{position:relative;width:42px;height:42px}
.wc-ring{width:42px;height:42px;border-radius:50%;padding:2.5px}
.wc-ring.new{background:conic-gradient(var(--acc),var(--acc2),#ff9ab5,var(--acc));animation:spinRing 3s linear infinite}
.wc-ring.viewed{background:var(--bg2)}
.wc-ring.none{background:var(--acc)}
@keyframes spinRing{to{transform:rotate(360deg)}}
.wc-inner{width:100%;height:100%;border-radius:50%;overflow:hidden;background:var(--bg)}
.wc-inner img{width:100%;height:100%;object-fit:cover}
.wc-verify{position:absolute;bottom:0;right:0;width:13px;height:13px;border-radius:50%;background:var(--acc);border:2px solid var(--card);display:flex;align-items:center;justify-content:center;font-size:6px;color:#fff}
.wc-name{font-size:9px;font-weight:800;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px;margin-top:2px;color:var(--tx)}
.wc-genre{font-size:7.5px;color:var(--muted);font-weight:600;text-align:center}
.wc-fol{font-size:8px;color:var(--acc);font-weight:800;margin-top:1px}
.wc-btn{margin-top:4px;width:100%;padding:3px 0;background:var(--acc);border:none;border-radius:9px;font-size:8px;font-weight:800;color:#fff;transition:.18s;box-shadow:0 2px 7px var(--glow)}
.wc-btn.ing{background:var(--bg);border:1.5px solid var(--bd);color:var(--muted);box-shadow:none}

/* ═══════════════════════════
   SECTION HEADERS
═══════════════════════════ */
.sech{display:flex;align-items:center;justify-content:space-between;padding:20px var(--px) 10px}
.sech-title{font-family:var(--font-d);font-size:17px;font-weight:700;color:var(--tx);display:flex;align-items:center;gap:8px}
.sech-icon{width:28px;height:28px;border-radius:9px;background:var(--acc-light);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sech-count{font-size:11px;font-weight:700;color:var(--muted);background:var(--bg2);padding:3px 9px;border-radius:20px}
.divider{height:1px;background:var(--bd2);margin:4px var(--px) 0}

/* ═══════════════════════════
   3-COL GRID (hero grid)
═══════════════════════════ */
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--gap);padding:0 var(--px)}
.sc{cursor:pointer;transition:.18s}
.sc:active{transform:scale(.97)}
.sc-cover{position:relative;border-radius:var(--radius-sm);overflow:hidden;background:var(--bg2);aspect-ratio:3/4;box-shadow:0 2px 8px rgba(0,0,0,.10)}
.sc-cover img{width:100%;height:100%;object-fit:cover}
.sc-scrim{position:absolute;bottom:0;left:0;right:0;height:52%;background:linear-gradient(0deg,rgba(0,0,0,.82),transparent)}
.sc-badge{position:absolute;top:5px;left:0;font-size:7px;font-weight:800;padding:2px 6px 2px 4px;border-radius:0 6px 6px 0;letter-spacing:.03em;text-transform:uppercase}
.sc-badge.hot{background:var(--acc);color:#fff}
.sc-badge.free{background:#16a34a;color:#fff}
.sc-badge.new{background:#7c3aed;color:#fff}
.sc-views{position:absolute;bottom:5px;left:5px;font-size:8px;font-weight:700;color:rgba(255,255,255,.82);display:flex;align-items:center;gap:2px}
.sc-title{font-family:var(--font-d);font-size:10px;font-weight:700;line-height:1.3;margin-top:6px;color:var(--tx);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sc-sub{font-size:9px;color:var(--muted);margin-top:2px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-stars{font-size:9px;color:#f0b429;letter-spacing:-1px;margin-top:1px}

/* ═══════════════════════════
   STORY LIST ROWS
═══════════════════════════ */
.story-list{display:flex;flex-direction:column;gap:var(--gap);padding:0 var(--px)}
.srow{
  display:flex;gap:12px;
  background:var(--card);border:1.5px solid var(--bd);
  border-radius:var(--radius);overflow:hidden;
  cursor:pointer;transition:border-color .18s, box-shadow .18s;
  position:relative;
  box-shadow:0 1px 6px rgba(0,0,0,.06);
}
.srow:active{transform:scale(.99);box-shadow:0 2px 12px rgba(255,0,80,.1);border-color:rgba(255,0,80,.3)}
.srow-thumb{width:86px;flex-shrink:0;position:relative;background-size:cover;background-position:center;min-height:118px}
.srow-scrim{position:absolute;inset:0;background:linear-gradient(270deg,rgba(255,255,255,0) 0%,rgba(255,255,255,.18) 100%)}
.srow-badge{position:absolute;top:7px;left:0;font-size:7px;font-weight:800;padding:2px 7px 2px 5px;border-radius:0 7px 7px 0;letter-spacing:.03em;text-transform:uppercase;z-index:1}
.srb-hot{background:var(--acc);color:#fff}
.srb-new{background:#7c3aed;color:#fff}
.srb-free{background:#16a34a;color:#fff}
.srow-body{flex:1;min-width:0;padding:10px 12px 10px 0;display:flex;flex-direction:column;gap:3px;justify-content:center}
.srow-cat{font-size:8px;font-weight:800;color:var(--acc);letter-spacing:.04em;text-transform:uppercase}
.srow-type{color:var(--muted2)}
.srow-title{font-family:var(--font-d);font-size:13px;font-weight:700;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:var(--tx)}
.srow-preview{font-size:10px;color:var(--muted);line-height:1.45;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.srow-meta{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap}
.srow-av{width:14px;height:14px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid var(--bd)}
.srow-author{font-size:9px;color:var(--muted);font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.srow-stats{display:flex;gap:8px;flex-shrink:0}
.srow-stat{font-size:9px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:2px}
.srow-stars{color:#f0b429;letter-spacing:-1px}
.srow-debate{position:absolute;bottom:7px;left:86px;right:0;display:flex;padding:0 10px}
.srow-debate-pill{display:inline-flex;align-items:center;gap:4px;background:rgba(255,0,80,.08);border:1px solid rgba(255,0,80,.2);border-radius:20px;padding:2px 8px;font-size:8px;font-weight:700;color:var(--acc)}
.debate-dot{width:4px;height:4px;border-radius:50%;background:var(--acc);animation:dbpulse 1.2s ease-in-out infinite;flex-shrink:0}
@keyframes dbpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.5)}}

/* ═══════════════════════════
   LOAD MORE INDICATOR (auto)
═══════════════════════════ */
.auto-loader{display:flex;align-items:center;justify-content:center;gap:8px;padding:18px;color:var(--muted);font-size:11px;font-weight:600}
.spinner{width:18px;height:18px;border-radius:50%;border:2.5px solid var(--bg2);border-top-color:var(--acc);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══════════════════════════
   PAGINATION
═══════════════════════════ */
.pagination{
  display:flex;align-items:center;justify-content:center;
  gap:6px;padding:20px var(--px) 8px;
}
.pg-btn{
  width:34px;height:34px;border-radius:50%;
  background:var(--card);border:1.5px solid var(--bd);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:var(--muted);
  cursor:pointer;transition:all .18s;
}
.pg-btn:hover{border-color:rgba(255,0,80,.3);color:var(--acc)}
.pg-btn:active{transform:scale(.92)}
.pg-btn.active{background:var(--acc);border-color:var(--acc);color:#fff;box-shadow:0 2px 10px var(--glow)}
.pg-btn.disabled{opacity:.35;pointer-events:none}
.pg-info{font-size:11px;font-weight:700;color:var(--muted);padding:0 6px;white-space:nowrap}

/* ═══════════════════════════
   AD SLOT
═══════════════════════════ */
.ad-slot{
  margin:18px var(--px) 0;
  border-radius:var(--radius);overflow:hidden;
  position:relative;height:88px;
  background-size:cover;background-position:center;
  cursor:pointer;
  border:1.5px solid var(--bd);
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}
.ad-scrim{position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.75) 0%,rgba(0,0,0,.3) 100%)}
.ad-badge{position:absolute;top:8px;right:8px;font-size:7px;font-weight:800;padding:2px 7px;border-radius:7px;background:rgba(255,255,255,.2);backdrop-filter:blur(8px);color:rgba(255,255,255,.7)}
.ad-content{position:relative;z-index:2;padding:10px 14px;height:100%;display:flex;flex-direction:column;justify-content:center;gap:3px}
.ad-brand{font-size:9px;font-weight:800;color:#ffcce0;display:flex;align-items:center;gap:5px;text-transform:uppercase}
.ad-logo{width:14px;height:14px;border-radius:4px}
.ad-headline{font-family:var(--font-d);font-size:13px;font-weight:700;color:#fff;line-height:1.2}
.ad-cta{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:800;color:rgba(255,255,255,.7);margin-top:2px}

/* ═══════════════════════════
   SORT SHEET
═══════════════════════════ */
.sheet-bg{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);display:none;align-items:flex-end}
.sheet-bg.open{display:flex}
.sheet{width:100%;background:var(--card);border-radius:22px 22px 0 0;padding:0 0 calc(16px + var(--safe-b));animation:slideUp .25s ease;box-shadow:0 -4px 30px rgba(0,0,0,.15)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:34px;height:4px;background:var(--bg2);border-radius:4px;margin:10px auto 0}
.sheet-title{font-size:13px;font-weight:700;padding:14px 16px 10px;border-bottom:1px solid var(--bd);color:var(--tx)}
.sort-opt{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;font-size:13px;font-weight:600;color:var(--tx);transition:.15s}
.sort-opt:active{background:var(--bg)}
.sort-opt .check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;flex-shrink:0}
.sort-opt.selected .check{background:var(--acc);border-color:var(--acc)}

/* ═══════════════════════════
   BOTTOM NAV
═══════════════════════════ */
.bottom-nav{
  position:absolute;bottom:0;left:0;right:0;
  background:var(--card);border-top:1px solid var(--bd);
  display:flex;justify-content:space-around;
  padding:8px 0 var(--safe-b);z-index:100;
  box-shadow:0 -2px 12px rgba(0,0,0,.06);
}
.bn-item{text-align:center;font-size:9px;font-weight:600;color:var(--muted);cursor:pointer;transition:.2s;padding:3px 8px}
.bn-item i{font-size:20px;display:block;margin-bottom:2px}
.bn-item.active{color:var(--acc)}

/* ═══════════════════════════
   TOAST
═══════════════════════════ */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--tx);color:var(--card);padding:9px 18px;border-radius:28px;font-size:12px;font-weight:700;z-index:900;opacity:0;transition:.28s;pointer-events:none;white-space:nowrap;max-width:88vw;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.18)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ═══════════════════════════
   ANIMATIONS
═══════════════════════════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .3s ease both}
.d1{animation-delay:.04s}.d2{animation-delay:.08s}.d3{animation-delay:.12s}
.d4{animation-delay:.16s}.d5{animation-delay:.20s}.d6{animation-delay:.24s}
.slide-in{animation:fadeUp .32s ease both}
</style>
</head>
<body>
<div class="shell">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="nav-logo" onclick="nav('discover.html')">D</div>
    <div class="page-title">
      <span class="page-title-text" id="pageTitleText">Popular Stories</span>
      <span class="page-title-badge" id="pageTitleBadge">🔥 HOT</span>
    </div>
    <div class="sort-btn" id="sortBtnEl" onclick="openSheet()">
      <i class="fas fa-sliders-h"></i>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <div class="filter-row" id="genreRow"></div>
    <div class="filter-divider"></div>
    <div class="filter-row" id="feelRow"></div>
  </div>

  <!-- BODY -->
  <div class="body" id="bodyEl">

    <!-- FEATURED BANNER -->
    <div class="feat-section fu d1" id="featSection">
      <div class="feat-outer">
        <div class="feat-track" id="featTrack"></div>
      </div>
      <div class="feat-dots" id="featDots"></div>
    </div>

    <div class="divider" style="margin-top:16px"></div>

    <!-- TOP WRITERS -->
    <div class="sech fu d2">
      <div class="sech-title"><div class="sech-icon" style="background:rgba(56,130,246,.08)">✍️</div><span id="writersTitle">Top Writers</span></div>
    </div>
    <div class="writers-row fu d2" id="writersRow"></div>

/* ═══════════════════════════
   PAGINATION & AUTO-LOAD STATE
   - Stories per "page" = 20
   - First 10 auto-load on scroll (within page)
   - After 10, pause — remaining 10 auto-load on scroll
   - After 20, show pagination controls
═══════════════════════════ */
const PAGE_SIZE   = 20; // full page
const AUTO_BATCH  = 10; // auto-load batch size
let currentSort   = 'popular';
let currentPage   = 1;  // 1-based
let renderedCount = 0;   // how many shown on current page
let autoLoading   = false;
let autoObserver  = null;

function getFilteredStories(){
  let list = activeFeel === 'all' ? [...STORIES] : STORIES.filter(s => s.feel === activeFeel);
  if(list.length < 5) list = [...STORIES];
  return list;
}
function sortStories(list){
  const s=[...list];
  if(currentSort==='rating') s.sort((a,b)=>b.rating-a.rating);
  else if(currentSort==='new') s.sort((a,b)=>(b.badge==='new'?1:0)-(a.badge==='new'?1:0));
  else if(currentSort==='trending') s.sort((a,b)=>b.likes-a.likes);
  else if(currentSort==='debate') s.sort((a,b)=>b.debate-a.debate);
  else s.sort((a,b)=>b.likes-a.likes);
  return s;
}
function getPageStories(){
  const sorted = sortStories(getFilteredStories());
  const total = sorted.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  const start = (currentPage - 1) * PAGE_SIZE;
  return {
    items: sorted.slice(start, start + PAGE_SIZE),
    total,
    totalPages,
    start,
  };
}

  const debatePill = s.debate > 0
    ? `<div class="srow-debate"><div class="srow-debate-pill"><div class="debate-dot"></div>⚔️ ${fmtN(s.debate)} debating</div></div>`
    : '';
  return`<div class="srow slide-in" onclick="nav('bridge.html')">
    <div class="srow-thumb" style="background-image:url('${s.img}')">
      <div class="srow-scrim"></div>
      ${s.badge?`<div class="srow-badge ${bdCls}">${s.badge.toUpperCase()}</div>`:''}
      ${debatePill}
    </div>
    <div class="srow-body">
      <div class="srow-cat">${s.cat} <span class="srow-type">· ${typeTxt}</span></div>
      <div class="srow-title">${s.title}</div>
      <div class="srow-preview">${s.preview}</div>
      <div class="srow-meta">
        <img class="srow-av" src="${s.av}" loading="lazy"/>
        <span class="srow-author">@${s.author}</span>
        <div class="srow-stats">
          <span class="srow-stat"><i class="fas fa-eye" style="font-size:7px"></i>${s.views}</span>
          <span class="srow-stat"><span class="srow-stars">${stars(s.rating)}</span> ${s.rating}</span>
        </div>
      </div>
    </div>
  </div>`;
}

/* ── SETUP STORY LIST ── */
function setupStoryList(){
  const list = $('storyList');
  list.innerHTML = '';
  renderedCount = 0;
  const {items, total, totalPages} = getPageStories();

  $('storyCount').textContent = `${total} stories`;

  // Disconnect old observer
  if(autoObserver){ autoObserver.disconnect(); autoObserver=null; }

  // Render first AUTO_BATCH instantly
  const firstBatch = items.slice(0, AUTO_BATCH);
  firstBatch.forEach(s => {
    const div = document.createElement('div');
    div.innerHTML = renderSRow(s);
    list.appendChild(div.firstElementChild);
  });
  renderedCount = firstBatch.length;

  // Hide pagination, hide loader
  $('paginationEl').style.display = 'none';
  $('autoLoader').style.display = 'none';

  if(items.length > renderedCount){
    // There are more items to auto-load on this page
    setupAutoLoader(items, totalPages);
  } else {
    // All items rendered, show pagination if needed
    if(totalPages > 1) renderPagination(totalPages);
  }
}

/* ── AUTO LOADER (scroll-triggered) ── */
function setupAutoLoader(items, totalPages){
  // Show loader sentinel
  $('autoLoader').style.display = 'flex';

  autoObserver = new IntersectionObserver(entries => {
    if(!entries[0].isIntersecting || autoLoading) return;
    autoLoading = true;

    // Small delay for visual feel
    setTimeout(() => {
      const nextBatch = items.slice(renderedCount, renderedCount + AUTO_BATCH);
      const list = $('storyList');
      nextBatch.forEach(s => {
        const div = document.createElement('div');
        div.innerHTML = renderSRow(s);
        list.appendChild(div.firstElementChild);
      });
      renderedCount += nextBatch.length;
      autoLoading = false;

      if(renderedCount >= items.length){
        // All current-page items rendered
        $('autoLoader').style.display = 'none';
        autoObserver.disconnect();
        autoObserver = null;
        if(totalPages > 1) renderPagination(totalPages);
      }
    }, 380);
  }, {rootMargin: '140px'});

  autoObserver.observe($('autoLoader'));
}

/* ── PAGINATION ── */
function renderPagination(totalPages){
  const pg = $('paginationEl');
  pg.style.display = 'flex';

  // Build page numbers with ellipsis
  const pages = [];
  if(totalPages <= 5){
    for(let i=1;i<=totalPages;i++) pages.push(i);
  } else {
    pages.push(1);
    if(currentPage > 3) pages.push('…');
    for(let i=Math.max(2,currentPage-1);i<=Math.min(totalPages-1,currentPage+1);i++) pages.push(i);
    if(currentPage < totalPages-2) pages.push('…');
    pages.push(totalPages);
  }

  pg.innerHTML = `
    <div class="pg-btn ${currentPage===1?'disabled':''}" onclick="goPage(${currentPage-1})">
      <i class="fas fa-chevron-left" style="font-size:11px"></i>
    </div>
    ${pages.map(p => p === '…'
      ? `<div class="pg-info">…</div>`
      : `<div class="pg-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</div>`
    ).join('')}
    <div class="pg-btn ${currentPage===totalPages?'disabled':''}" onclick="goPage(${currentPage+1})">
      <i class="fas fa-chevron-right" style="font-size:11px"></i>
    </div>
  `;
}

function goPage(p){
  const {totalPages} = getPageStories();
  if(p < 1 || p > totalPages) return;
  currentPage = p;
  // Scroll to story list section
  $('bodyEl').scrollTo({top: $('storyList').offsetTop - 120, behavior:'smooth'});
  setTimeout(setupStoryList, 200);
}

/* ── GENRE PILLS ── */
function renderGenrePills(){
  $('genreRow').innerHTML = GENRES.map(g => {
    const active = g.toLowerCase() === CAT || (g==='All' && CAT==='popular');
    return `<div class="chip${active?' active':''}" onclick="nav('browse.html?cat=${g.toLowerCase()}')">${g}</div>`;
  }).join('');
}

/* ── FEELING CHIPS ── */
function renderFeelChips(){
  $('feelRow').innerHTML = FEELINGS.map(f =>
    `<div class="feel-chip${f.id===activeFeel?' active':''}" id="fc-${f.id}" onclick="setFeel('${f.id}')">${f.e} ${f.label}</div>`
  ).join('');
}
function setFeel(id){
  activeFeel = id;
  document.querySelectorAll('.feel-chip').forEach(el => el.classList.toggle('active', el.id===`fc-${id}`));
  currentPage = 1;
  renderWriters();
  renderGrid();
  setupStoryList();
}

/* ── PAGE META ── */
function applyMeta(){
  $('pageTitleText').textContent = cfg.label;
  $('pageTitleBadge').textContent = cfg.badge;
  $('writersTitle').textContent = cfg.writersTitle;
  $('gridTitle').textContent = cfg.gridTitle;
  $('listTitle').textContent = cfg.listTitle;
}

/* ── FEATURED BANNER ── */
let fIdx=0, fTimer=null;
function renderFeat(){
  const track = $('featTrack');
  const dots  = $('featDots');
  track.innerHTML = FEAT.map(f=>`
    <div class="feat-slide" style="background-image:url('${f.img}')" onclick="nav('bridge.html')">
      <div class="feat-scrim"></div>
      <div class="feat-top">
        <div class="feat-cat">${f.cat}</div>
        <div class="feat-emo ${f.emo.cls}">${f.emo.icon} ${f.emo.label}</div>
      </div>
      <div class="feat-body">
        <div class="feat-title">${f.title}</div>
        <div class="feat-meta">
          <img class="feat-av" src="${f.av}" loading="lazy"/>
          <span class="feat-author">@${f.author}</span>
          <div class="feat-stats">
            <span class="feat-stat"><i class="fas fa-eye" style="font-size:7px"></i>${f.reads}</span>
            <span class="feat-stat"><i class="fas fa-heart" style="font-size:7px"></i>${f.likes}</span>
          </div>
        </div>
      </div>
    </div>`).join('');
  dots.innerHTML = FEAT.map((_,i)=>`<div class="fdot${i===0?' on':''}" onclick="goFeat(${i})"></div>`).join('');
  startFeat();
  const outer = $('featSection');
  let sx=0;
  outer.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;clearTimeout(fTimer);},{passive:true});
  outer.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>40)goFeat(dx<0?(fIdx+1)%FEAT.length:(fIdx-1+FEAT.length)%FEAT.length);else startFeat();},{passive:true});
}
function goFeat(i){fIdx=((i%FEAT.length)+FEAT.length)%FEAT.length;$('featTrack').style.transform=`translateX(-${fIdx*100}%)`;document.querySelectorAll('.fdot').forEach((d,j)=>d.classList.toggle('on',j===fIdx));clearTimeout(fTimer);startFeat();}
function startFeat(){fTimer=setTimeout(()=>goFeat(fIdx+1),4500);}

/* ── WRITERS ── */
function renderWriters(){
  $('writersRow').innerHTML = WRITERS.map(w=>`
    <div class="wc" onclick="nav('profile.html')">
      <div class="wc-ring-wrap">
        <div class="wc-ring ${w.status}">
          <div class="wc-inner"><img src="${w.av}" loading="lazy"/></div>
        </div>
        ${w.v?'<div class="wc-verify">✓</div>':''}
      </div>
      <div class="wc-name">${w.name}</div>
      <div class="wc-genre">${w.genre}</div>
      <div class="wc-fol">${w.fol}</div>
      <button class="wc-btn${w.ing?' ing':''}" onclick="event.stopPropagation();toggleFollow(this,'${w.name}')">${w.ing?'Following':'Follow'}</button>
    </div>`).join('');
}
function toggleFollow(btn,name){
  const on = btn.classList.contains('ing');
  btn.classList.toggle('ing',!on);
  btn.textContent = on?'Follow':'Following';
  toast(on?`Unfollowed @${name}`:`✅ Following @${name}`);
}

/* ── 3-COL GRID ── */
function renderGrid(){
  const stories = sortStories(getFilteredStories()).slice(0,6);
  $('storyGrid').innerHTML = stories.map(s=>{
    const bc = s.badge==='hot'?'hot':s.badge==='free'?'free':s.badge==='new'?'new':'';
    return`<div class="sc" onclick="nav('bridge.html')">
      <div class="sc-cover">
        <img src="${s.img}" loading="lazy"/>
        <div class="sc-scrim"></div>
        ${s.badge?`<div class="sc-badge ${bc}">${s.badge.toUpperCase()}</div>`:''}
        <div class="sc-views"><i class="fas fa-eye" style="font-size:7px"></i>${s.views}</div>
      </div>
      <div class="sc-title">${s.title}</div>
      <div class="sc-sub">@${s.author}</div>
      <div class="sc-stars">${stars(s.rating)} <span style="color:var(--muted);font-size:8px">${s.rating}</span></div>
    </div>`;
  }).join('');
}

/* ── AD ── */
function renderAd(){
  const ad = ADS[Math.floor(Math.random()*ADS.length)];
  $('adSlot').style.backgroundImage = `url('${ad.bg}')`;
  $('adLogo').src = ad.logo;
  $('adBrand').textContent = ad.brand;
  $('adHeadline').textContent = ad.headline;
}

/* ── SORT SHEET ── */
function openSheet(){$('sheetBg').classList.add('open');}
function closeBg(e){if(e.target===e.currentTarget)$('sheetBg').classList.remove('open');}
function setSort(el,sort){
  currentSort=sort;
  document.querySelectorAll('.sort-opt').forEach(o=>{o.classList.remove('selected');o.querySelector('.check').textContent='';});
  el.classList.add('selected');el.querySelector('.check').textContent='✓';
  $('sheetBg').classList.remove('open');
  currentPage = 1;
  renderGrid();
  setupStoryList();
  $('sortBtnEl').classList.add('active');
  toast('✅ Sorted!');
}

/* ── INIT ── */
applyMeta();
renderGenrePills();
renderFeelChips();
renderFeat();
renderWriters();
renderGrid();
renderAd();
setupStoryList();
</script>
</body>
</html>
