<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="theme-color" content="#000000"/>
<title>Droboard — Browse</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
:root{
  --bg:#000000;
  --bg2:#000000;
  --bg3:#111111;
  --card:#0a0a0a;
  --surface:#111111;
  --surface2:#1a1a1a;

  --red:#ff0050;
  --red2:#ff6b8a;
  --red-grad:linear-gradient(135deg,#ff0050,#ff6b8a);
  --red-glow:rgba(255,0,80,.3);
  --red-dim:rgba(255,0,80,.12);
  --red-border:rgba(255,0,80,.35);

  --tx:#ffffff;
  --tx2:#a1a1aa;
  --muted:#71717a;

  --bd:rgba(255,255,255,.07);
  --bd2:rgba(255,255,255,.04);

  --safe-b:env(safe-area-inset-bottom,14px);
  --r:12px;
  --r-sm:8px;
  --px:14px;

  --font-d:'Syne',sans-serif;
  --font-b:'Instrument Sans',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#000;color:var(--tx);font-family:var(--font-b);overflow:hidden}
img{display:block;user-select:none}
a{color:inherit;text-decoration:none}
button{font-family:var(--font-b);cursor:pointer;border:none}

.shell{position:fixed;inset:0;display:flex;flex-direction:column;background:#000}

/* TOPBAR */
.topbar{
  flex-shrink:0;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px;
  padding:10px var(--px) 9px;background:#000;border-bottom:1px solid var(--bd);z-index:60;
}
.logo{font-family:var(--font-d);font-size:22px;font-weight:800;letter-spacing:-1px;background:var(--red-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.title-wrap{display:flex;align-items:center;gap:0;min-width:0}
.page-title-text{font-family:var(--font-d);font-size:15px;font-weight:800;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.page-badge{font-size:8px;font-weight:800;padding:2px 8px;border-radius:10px;background:var(--red);color:#fff;flex-shrink:0;margin-left:6px}
.sort-btn{width:34px;height:34px;border-radius:50%;background:#000;border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted);cursor:pointer;flex-shrink:0;transition:.18s}
.sort-btn.active{background:var(--red-dim);border-color:var(--red-border);color:var(--red2)}

/* FILTER BAR */
.filter-bar{flex-shrink:0;background:#000;border-bottom:1px solid var(--bd)}
.filter-row{display:flex;gap:6px;padding:7px var(--px);overflow-x:auto;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid var(--bd);background:transparent;color:var(--muted);cursor:pointer;transition:all .18s;white-space:nowrap}
.chip.active{background:var(--red-grad);border-color:transparent;color:#fff;box-shadow:0 2px 10px var(--red-glow)}
.chip:active{transform:scale(.95)}
.feel-chip{flex-shrink:0;display:flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid var(--bd);background:transparent;color:var(--muted);cursor:pointer;transition:all .18s;white-space:nowrap}
.feel-chip.active{background:var(--red-dim);border-color:var(--red-border);color:var(--red2)}
.filter-div{height:1px;background:var(--bd2);margin:0 var(--px)}

/* BODY */
.body{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;padding-bottom:calc(64px + var(--safe-b) + 16px)}
.body::-webkit-scrollbar{display:none}

/* BANNER */
.banner-wrap{margin:14px var(--px) 0;border-radius:var(--r);overflow:hidden;position:relative;box-shadow:0 6px 28px rgba(0,0,0,.6)}
.btk{display:flex;will-change:transform;transition:transform .38s cubic-bezier(.4,0,.2,1)}
.bslide{flex:0 0 100%;height:200px;position:relative;background-size:cover;background-position:center 25%;cursor:pointer}
.bscrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.05) 0%,rgba(0,0,0,.4) 45%,rgba(0,0,0,.97) 100%)}
.bcta{position:absolute;top:11px;right:11px;background:var(--red-grad);color:#fff;padding:5px 13px;border-radius:20px;font-size:9px;font-weight:800;cursor:pointer;box-shadow:0 2px 12px var(--red-glow);letter-spacing:.04em}
.bcontent{position:absolute;bottom:0;left:0;right:0;padding:10px 13px 14px}
.btags{display:flex;gap:5px;margin-bottom:7px;flex-wrap:wrap}
.btag{font-size:8px;font-weight:800;padding:2px 8px;border-radius:6px;letter-spacing:.03em}
.btag-r{background:rgba(255,0,80,.28);color:#ff6b8a;border:1px solid rgba(255,0,80,.4)}
.btag-m{background:rgba(255,255,255,.12);backdrop-filter:blur(4px);color:rgba(255,255,255,.85)}
.btitle{font-family:var(--font-d);font-size:14px;font-weight:800;line-height:1.28;color:#fff;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-shadow:0 1px 8px rgba(0,0,0,.6)}
.bmeta{display:flex;align-items:center;gap:7px}
.bav{width:19px;height:19px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(255,255,255,.3)}
.bauthor{font-size:10px;color:rgba(255,255,255,.78);font-weight:700;flex:1}
.bstats{display:flex;gap:8px}
.bstat{font-size:9px;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:3px;font-weight:600}
.bdots{display:flex;gap:4px;justify-content:center;padding:8px 0 2px}
.bdot{width:5px;height:5px;border-radius:50%;background:#222;cursor:pointer;transition:.25s}
.bdot.on{width:18px;border-radius:3px;background:var(--red)}

/* SECTION HEADERS */
.sh{display:flex;align-items:center;justify-content:space-between;padding:20px var(--px) 10px}
.sh-title{font-family:var(--font-d);font-size:15px;font-weight:800;color:var(--tx);display:flex;align-items:center;gap:8px}
.sh-title.line{border-left:3px solid var(--red);padding-left:9px}
.sh-icon{width:26px;height:26px;border-radius:8px;background:var(--red-dim);display:flex;align-items:center;justify-content:center;font-size:13px;border:1px solid var(--red-border)}
.sh-more{font-size:11px;font-weight:700;color:var(--tx2);cursor:pointer;display:flex;align-items:center;gap:3px;padding:4px 10px;border-radius:20px;background:var(--surface);border:1px solid var(--bd);transition:background .18s}
.sh-count{font-size:11px;font-weight:700;color:var(--muted);background:var(--surface);padding:3px 9px;border-radius:20px;border:1px solid var(--bd)}
.div{height:1px;background:var(--bd2);margin:4px var(--px) 0}

/* TOP WRITERS */
.writers-scroll{display:flex;gap:12px;padding:0 var(--px) 2px;overflow-x:auto;scrollbar-width:none}
.writers-scroll::-webkit-scrollbar{display:none}
.wc{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;width:72px;cursor:pointer}
.wc-ring-w{position:relative;width:54px;height:54px;flex-shrink:0}
/* Writer avatar ring — static, no rotation */
.wc-ring{width:54px;height:54px;border-radius:50%;padding:2.5px}
.wc-ring.has-status{background:transparent;box-shadow:0 0 0 2.5px var(--red),0 0 10px var(--red-glow)}
.wc-ring.viewed-status{background:transparent;box-shadow:0 0 0 2.5px #3a3a3a}
.wc-ring.no-status{background:#2a2a2a}
.wc-inner{width:100%;height:100%;border-radius:50%;overflow:hidden;background:#111;border:2px solid #000}
.wc-inner img{width:100%;height:100%;object-fit:cover}
.wc-badge{position:absolute;bottom:0;right:0;font-size:6px;font-weight:900;padding:2px 4px;border-radius:4px;border:1.5px solid #000;line-height:1.2}
.wb-new{background:#1a3a6e;color:#93c5fd}
.wb-live{background:var(--red);color:#fff}
.wc-name{font-size:9.5px;font-weight:800;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px;color:var(--tx)}
.wc-genre{font-size:8px;color:var(--muted);font-weight:600;text-align:center}

/* MUST READ — 3-col grid */
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 var(--px)}
.sc{cursor:pointer;transition:.18s}
.sc:active{transform:scale(.97)}
.sc-cover{position:relative;border-radius:var(--r-sm);overflow:hidden;background:#111;aspect-ratio:3/4;box-shadow:0 3px 12px rgba(0,0,0,.6)}
.sc-cover img{width:100%;height:100%;object-fit:cover}
.sc-scrim{position:absolute;bottom:0;left:0;right:0;height:55%;background:linear-gradient(0deg,rgba(0,0,0,.95),transparent)}
.sc-badge{position:absolute;top:5px;left:0;font-size:7px;font-weight:800;padding:2px 6px 2px 4px;border-radius:0 6px 6px 0;letter-spacing:.03em;text-transform:uppercase}
.badge-hot{background:var(--red);color:#fff}
.badge-free{background:#14532d;color:#86efac}
.badge-new{background:#3b0764;color:#d8b4fe}
.sc-views{position:absolute;bottom:5px;left:5px;font-size:8px;font-weight:700;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:2px}
.sc-title{font-size:10.5px;font-weight:700;line-height:1.3;margin-top:6px;color:var(--tx);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sc-sub{font-size:9px;color:var(--muted);margin-top:2px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* STORY LIST — borderless cover-left layout */
.story-list{display:flex;flex-direction:column;gap:14px;padding:0 var(--px)}
.srow{display:flex;gap:11px;cursor:pointer;transition:.18s;background:transparent;border:none;}
.srow:active{opacity:.8}
.srow-cover{flex-shrink:0;width:80px;position:relative;border-radius:var(--r-sm);overflow:hidden;background:#111;aspect-ratio:3/4;box-shadow:0 3px 12px rgba(0,0,0,.6);}
.srow-cover img{width:100%;height:100%;object-fit:cover;display:block}
.srow-cover-scrim{position:absolute;bottom:0;left:0;right:0;height:50%;background:linear-gradient(0deg,rgba(0,0,0,.9),transparent)}
.srow-badge{position:absolute;top:4px;left:0;font-size:7px;font-weight:800;padding:2px 6px 2px 4px;border-radius:0 5px 5px 0;letter-spacing:.03em;text-transform:uppercase;z-index:1}
.srb-hot{background:var(--red);color:#fff}
.srb-new{background:#3b0764;color:#d8b4fe}
.srb-free{background:#14532d;color:#86efac}
.srow-views{position:absolute;bottom:4px;left:5px;font-size:7.5px;font-weight:700;color:rgba(255,255,255,.75);display:flex;align-items:center;gap:2px}
.srow-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;justify-content:center;padding:2px 0}
.srow-cat{font-size:8px;font-weight:800;color:var(--red2);letter-spacing:.04em;text-transform:uppercase;margin-bottom:1px}
.srow-type{color:var(--muted);font-weight:600;text-transform:none;letter-spacing:0}
.srow-title{font-family:var(--font-d);font-size:12px;font-weight:700;line-height:1.35;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;color:var(--tx)}
.srow-preview{font-size:9.5px;color:var(--tx2);line-height:1.45;margin-top:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.srow-meta{display:flex;align-items:center;gap:5px;margin-top:6px;flex-wrap:wrap}
.srow-av{width:13px;height:13px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid rgba(255,255,255,.1)}
.srow-author{font-size:8.5px;color:var(--muted);font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.srow-stats{display:flex;gap:7px;flex-shrink:0}
/* Like stat: icon same color as count (dim white / tx2) */
.srow-stat{font-size:8.5px;color:var(--tx2);font-weight:600;display:flex;align-items:center;gap:2px}
.srow-stat i{color:var(--tx2)}
/* Debate stat: icon same color as count (red2) */
.srow-debate-stat{font-size:8.5px;font-weight:700;color:var(--red2);display:flex;align-items:center;gap:2px}
.srow-debate-stat i{color:var(--red2)}

/* YOU MAY LIKE — now uses same 3-col grid as Must Read */
.auto-loader{display:flex;align-items:center;justify-content:center;gap:8px;padding:18px;color:var(--muted);font-size:11px;font-weight:600}
.spinner{width:18px;height:18px;border-radius:50%;border:2.5px solid #111;border-top-color:var(--red);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:center;gap:6px;padding:20px var(--px) 8px}
.pg-btn{width:34px;height:34px;border-radius:50%;background:#0a0a0a;border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .18s}
.pg-btn:active{transform:scale(.92)}
.pg-btn.active{background:var(--red-grad);border-color:transparent;color:#fff;box-shadow:0 2px 10px var(--red-glow)}
.pg-btn.disabled{opacity:.3;pointer-events:none}
.pg-info{font-size:11px;font-weight:700;color:var(--muted);padding:0 4px}

/* SORT SHEET */
.sheet-bg{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);display:none;align-items:flex-end}
.sheet-bg.open{display:flex}
.sheet{width:100%;background:#0d0d0d;border-radius:22px 22px 0 0;padding:0 0 calc(16px + var(--safe-b));animation:slideUp .25s ease;box-shadow:0 -4px 30px rgba(0,0,0,.8);border-top:1px solid var(--bd)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:34px;height:4px;background:#222;border-radius:4px;margin:10px auto 0}
.sheet-title{font-family:var(--font-d);font-size:13px;font-weight:800;padding:14px 16px 10px;border-bottom:1px solid var(--bd);color:var(--tx)}
.sort-opt{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;font-size:13px;font-weight:600;color:var(--tx);transition:.15s}
.sort-opt:active{background:#111}
.sort-opt .check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;flex-shrink:0}
.sort-opt.selected .check{background:var(--red);border-color:var(--red)}

/* BOTTOM NAV */
.bnav{position:absolute;bottom:0;left:0;right:0;background:#000;border-top:1px solid var(--bd);display:flex;justify-content:space-around;padding:8px 0 var(--safe-b);z-index:100;box-shadow:0 -2px 16px rgba(0,0,0,.6)}
.bn{text-align:center;font-size:9px;font-weight:600;color:var(--muted);cursor:pointer;transition:.2s;padding:3px 8px;position:relative}
.bn i{font-size:20px;display:block;margin-bottom:2px}
.bn.on{color:var(--red)}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(16px);background:#111;color:var(--tx);padding:9px 18px;border-radius:28px;font-size:12px;font-weight:700;z-index:900;opacity:0;transition:.28s;pointer-events:none;white-space:nowrap;max-width:88vw;text-align:center;border:1px solid var(--bd);box-shadow:0 4px 24px rgba(0,0,0,.7)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* STATUS VIEWER (same as homepage) */
.status-ov{position:fixed;inset:0;z-index:500;background:#000;display:none;flex-direction:column}
.status-ov.open{display:flex}
.status-top-bar{position:absolute;top:0;left:0;right:0;z-index:10;padding:12px 14px 8px;background:linear-gradient(to bottom,rgba(0,0,0,.85),transparent)}
.status-prog-bars{display:flex;gap:4px;margin-bottom:10px}
.spb{flex:1;height:3px;background:rgba(255,255,255,.25);border-radius:3px;overflow:hidden}
.spb-fill{height:100%;background:#fff;border-radius:3px;width:0%}
.status-writer-info{display:flex;align-items:center;gap:10px}
.status-w-av{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--red)}
.status-w-name{font-size:13px;font-weight:700;color:#fff;flex:1}
.status-w-time{font-size:10px;color:rgba(255,255,255,.55)}
.status-close-btn{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.status-content{flex:1;position:relative;overflow:hidden}
.status-slide{position:absolute;inset:0;background-size:cover;background-position:center}
.status-slide-grad{position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.82) 0%,rgba(0,0,0,.25) 55%,rgba(0,0,0,.5) 100%)}
.status-slide-text{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:80px 24px 100px;text-align:center;pointer-events:none;user-select:none}
.status-slide-quote{font-size:20px;font-weight:700;line-height:1.42;color:#fff;text-shadow:0 2px 14px rgba(0,0,0,.8)}
.status-slide-caption{font-size:12px;color:rgba(255,255,255,.65);margin-top:10px}
.status-nav-left{position:absolute;left:0;top:0;bottom:0;width:35%;cursor:pointer;z-index:10}
.status-nav-right{position:absolute;right:0;top:0;bottom:0;width:35%;cursor:pointer;z-index:10}
.status-bottom{position:absolute;bottom:0;left:0;right:0;padding:12px 16px 28px;background:linear-gradient(to top,rgba(0,0,0,.85),transparent);display:flex;align-items:center;gap:10px;z-index:15}
.status-reply-inp{flex:1;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.3);border-radius:30px;padding:9px 14px;color:#fff;font-family:var(--font-b);font-size:12px;outline:none}
.status-reply-inp::placeholder{color:rgba(255,255,255,.5)}
.status-react-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ANIMATIONS */
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu .32s ease both}
.d1{animation-delay:.03s}.d2{animation-delay:.07s}.d3{animation-delay:.11s}
.d4{animation-delay:.15s}.d5{animation-delay:.19s}.d6{animation-delay:.23s}
</style>
</head>
<body>
<div class="shell">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo">Dro</div>
    <div class="title-wrap">
      <span class="page-title-text" id="pageTitleText">Popular Stories</span>
      <span class="page-badge" id="pageBadge">🔥 HOT</span>
    </div>
    <div class="sort-btn" id="sortBtnEl" onclick="openSheet()">
      <i class="fas fa-sliders-h"></i>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <div class="filter-row" id="genreRow"></div>
    <div class="filter-div"></div>
    <div class="filter-row" id="feelRow"></div>
  </div>

  <!-- BODY -->
  <div class="body" id="bodyEl">

    <!-- BANNER -->
    <div class="fu d1" id="bannerSec">
      <div class="banner-wrap">
        <div class="btk" id="btk"></div>
      </div>
      <div class="bdots" id="bdots"></div>
    </div>

    <div class="div" style="margin-top:16px"></div>

    <!-- TOP WRITERS -->
    <div class="sh fu d2">
      <div class="sh-title line">Top Writers</div>
    </div>
    <div class="writers-scroll fu d2" id="writersRow"></div>

    <div class="div" style="margin-top:16px"></div>

    <!-- MUST READ GRID -->
    <div class="sh fu d3">
      <div class="sh-title"><div class="sh-icon">✨</div><span id="gridTitle">Must Read</span></div>
    </div>
    <div class="g3 fu d3" id="storyGrid"></div>

    <div class="div" style="margin-top:16px"></div>

    <!-- ALL STORIES LIST -->
    <div class="sh fu d4">
      <div class="sh-title line"><span id="listTitle">All Stories</span></div>
      <span class="sh-count" id="storyCount"></span>
    </div>
    <div class="story-list" id="storyList"></div>
    <div id="autoLoader" class="auto-loader" style="display:none">
      <div class="spinner"></div><span>Loading more…</span>
    </div>
    <div class="pagination" id="paginationEl" style="display:none"></div>

    <!-- YOU MAY LIKE — now uses same 3-col grid card as Must Read -->
    <div class="sh fu d5" id="ymlSection" style="display:none">
      <div class="sh-title line">You May Like</div>
      <div class="sh-more" onclick="toast('💡 More picks')">More <i class="fas fa-chevron-right" style="font-size:9px"></i></div>
    </div>
    <div class="g3 fu d5" id="ymlGrid"></div>

    <div style="height:20px"></div>
  </div>

  <!-- BOTTOM NAV -->

  let sx=0;
  document.getElementById('bannerSec').addEventListener('touchstart',e=>{sx=e.touches[0].clientX;clearTimeout(bTimer)},{passive:true});
  document.getElementById('bannerSec').addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>40)goBanner(dx<0?(bIdx+1)%BANNERS.length:(bIdx-1+BANNERS.length)%BANNERS.length);else startBanner()},{passive:true});
})();
function goBanner(i){bIdx=i;document.getElementById('btk').style.transform=`translateX(-${i*100}%)`;document.querySelectorAll('.bdot').forEach((d,j)=>d.classList.toggle('on',j===i));clearTimeout(bTimer);startBanner()}
function startBanner(){bTimer=setTimeout(()=>goBanner((bIdx+1)%BANNERS.length),4200)}

/* ── Writers row with status logic ── */
function renderWritersRow(){
  document.getElementById('writersRow').innerHTML=WRITERS.map(w=>{
    const ws=WRITER_STATUSES[w.id];
    const hasStatus=ws?.hasStatus;
    const viewed=ws?.viewed;
    // Ring class: has-status=red border, viewed-status=dim gray, no-status=dark
    const ringCls=hasStatus?(viewed?'viewed-status':'has-status'):'no-status';
    const badge=w.id==='w5'?'<div class="wc-badge wb-live">LIVE</div>':
                 w.id==='w2'||w.id==='w8'?'<div class="wc-badge wb-new">NEW</div>':'';
    const clickHandler=hasStatus?`onclick="openStatus('${w.id}')"`:
                        `onclick="toast('@${w.name} has no status yet')"`;
    return`<div class="wc" ${clickHandler}>
      <div class="wc-ring-w">
        <div class="wc-ring ${ringCls}">
          <div class="wc-inner"><img src="${w.av}" loading="lazy"/></div>
        </div>
        ${badge}
      </div>
      <div class="wc-name">${w.name}</div>
      <div class="wc-genre">${WRITER_STATUSES[w.id]?.hasStatus===false?'No status':w.genre}</div>
    </div>`;
  }).join('');
}
renderWritersRow();

/* ── Must Read grid (3-col sc cards, story titles link to bridge.html) ── */
function renderGrid(){
  const stories=getFiltered().sort((a,b)=>b.likes-a.likes).slice(0,6);
  document.getElementById('storyGrid').innerHTML=stories.map(s=>{
    const bc=s.badge==='hot'?'badge-hot':s.badge==='free'?'badge-free':s.badge==='new'?'badge-new':'';
    return`<div class="sc">
      <div class="sc-cover" onclick="location.href='bridge.html?id=${s.id}'">
        <img src="${s.img}" loading="lazy"/>
        <div class="sc-scrim"></div>
        ${s.badge?`<div class="sc-badge ${bc}">${s.badge.toUpperCase()}</div>`:''}
        <div class="sc-views"><i class="fas fa-eye" style="font-size:7px"></i>${s.views}</div>
      </div>
      <a href="bridge.html?id=${s.id}" class="sc-title">${s.title}</a>
      <a href="profile.html?id=${s.authorId}" class="sc-sub">@${s.author}</a>
    </div>`;
  }).join('');
}
renderGrid();

/* ── Story list ── */
const PAGE_SIZE=20,AUTO_BATCH=10;
let currentSort='popular',currentPage=1,renderedCount=0,autoLoading=false,autoObserver=null;

function getFiltered(){
  let list=activeFeel==='all'?[...STORIES]:STORIES.filter(s=>s.feel===activeFeel);
  if(list.length<3)list=[...STORIES];
  return list;
}
function getSorted(){
  const s=getFiltered();
  if(currentSort==='new')s.sort((a,b)=>(b.badge==='new'?1:0)-(a.badge==='new'?1:0));
  else if(currentSort==='trending'||currentSort==='popular')s.sort((a,b)=>b.likes-a.likes);
  else if(currentSort==='debate')s.sort((a,b)=>b.debate-a.debate);
  return s;
}
function getPageItems(){
  const sorted=getSorted(),total=sorted.length,totalPages=Math.max(1,Math.ceil(total/PAGE_SIZE));
  return{items:sorted.slice((currentPage-1)*PAGE_SIZE,currentPage*PAGE_SIZE),total,totalPages};
}

function renderSRow(s){
  const bdCls=s.badge==='hot'?'srb-hot':s.badge==='new'?'srb-new':s.badge==='free'?'srb-free':'';
  const typeTxt=s.type==='poem'?'🌙 Poem':s.type==='short'?'✨ Short':`S${s.season||1}·Ch${s.ch||1}`;
  return`<div class="srow" onclick="location.href='bridge.html?id=${s.id}'">
    <div class="srow-cover">
      <img src="${s.img}" loading="lazy"/>
      <div class="srow-cover-scrim"></div>
      ${s.badge?`<div class="srow-badge ${bdCls}">${s.badge.toUpperCase()}</div>`:''}
      <div class="srow-views"><i class="fas fa-eye" style="font-size:7px"></i>${s.views}</div>
    </div>
    <div class="srow-body">
      <div class="srow-cat">${s.cat} <span class="srow-type">· ${typeTxt}</span></div>
      <a href="bridge.html?id=${s.id}" class="srow-title" onclick="event.stopPropagation()">${s.title}</a>
      <div class="srow-preview">${s.preview}</div>
      <div class="srow-meta">
        <img class="srow-av" src="${s.av}" loading="lazy"/>
        <a href="profile.html?id=${s.authorId}" class="srow-author" onclick="event.stopPropagation()">@${s.author}</a>
        <div class="srow-stats">
          <span class="srow-stat"><i class="fas fa-heart" style="font-size:7px"></i>${fmtN(s.likes)}</span>
          ${s.debate>0?`<span class="srow-debate-stat"><i class="fas fa-fire" style="font-size:7px"></i>${fmtN(s.debate)}</span>`:''}
        </div>
      </div>
    </div>
  </div>`;
}

function setupStoryList(){
  const list=document.getElementById('storyList');
  list.innerHTML='';renderedCount=0;
  if(autoObserver){autoObserver.disconnect();autoObserver=null}
  const{items,total,totalPages}=getPageItems();
  document.getElementById('storyCount').textContent=`${total} stories`;
  document.getElementById('paginationEl').style.display='none';
  document.getElementById('autoLoader').style.display='none';
  document.getElementById('ymlSection').style.display='none';
  document.getElementById('ymlGrid').innerHTML='';
  const firstBatch=items.slice(0,AUTO_BATCH);
  firstBatch.forEach(s=>{const d=document.createElement('div');d.innerHTML=renderSRow(s);list.appendChild(d.firstElementChild)});
  renderedCount=firstBatch.length;
  if(items.length>renderedCount)setupAutoLoader(items,totalPages);
  else{if(totalPages>1)renderPagination(totalPages);showYouMayLike()}
}

function setupAutoLoader(items,totalPages){
  document.getElementById('autoLoader').style.display='flex';
  autoObserver=new IntersectionObserver(entries=>{
    if(!entries[0].isIntersecting||autoLoading)return;
    autoLoading=true;
    setTimeout(()=>{
      const nb=items.slice(renderedCount,renderedCount+AUTO_BATCH);
      const list=document.getElementById('storyList');
      nb.forEach(s=>{const d=document.createElement('div');d.innerHTML=renderSRow(s);list.appendChild(d.firstElementChild)});
      renderedCount+=nb.length;autoLoading=false;
      if(renderedCount>=items.length){
        document.getElementById('autoLoader').style.display='none';
        autoObserver.disconnect();autoObserver=null;
        const{totalPages}=getPageItems();
        if(totalPages>1)renderPagination(totalPages);
        showYouMayLike();
      }
    },380);
  },{rootMargin:'140px'});
  autoObserver.observe(document.getElementById('autoLoader'));
}

function renderPagination(totalPages){
  const pg=document.getElementById('paginationEl');pg.style.display='flex';
  const pages=[];
  if(totalPages<=5)for(let i=1;i<=totalPages;i++)pages.push(i);
  else{
    pages.push(1);if(currentPage>3)pages.push('…');
    for(let i=Math.max(2,currentPage-1);i<=Math.min(totalPages-1,currentPage+1);i++)pages.push(i);
    if(currentPage<totalPages-2)pages.push('…');pages.push(totalPages);
  }
  pg.innerHTML=`
    <div class="pg-btn${currentPage===1?' disabled':''}" onclick="goPage(${currentPage-1})"><i class="fas fa-chevron-left" style="font-size:11px"></i></div>
    ${pages.map(p=>p==='…'?`<div class="pg-info">…</div>`:`<div class="pg-btn${p===currentPage?' active':''}" onclick="goPage(${p})">${p}</div>`).join('')}
    <div class="pg-btn${currentPage===totalPages?' disabled':''}" onclick="goPage(${currentPage+1})"><i class="fas fa-chevron-right" style="font-size:11px"></i></div>`;
}

function goPage(p){
  const{totalPages}=getPageItems();if(p<1||p>totalPages)return;
  currentPage=p;
  document.getElementById('bodyEl').scrollTo({top:document.getElementById('storyList').offsetTop-120,behavior:'smooth'});
  setTimeout(setupStoryList,200);
}

/* ── You May Like — 3-col grid (same card as Must Read) ── */
function showYouMayLike(){
  document.getElementById('ymlSection').style.display='flex';
  document.getElementById('ymlGrid').innerHTML=YOU_MAY_LIKE.map(s=>{
    const bc=s.badge==='hot'?'badge-hot':s.badge==='free'?'badge-free':s.badge==='new'?'badge-new':'';
    return`<div class="sc">
      <div class="sc-cover" onclick="location.href='bridge.html?id=${s.id}'">
        <img src="${s.img}" loading="lazy"/>
        <div class="sc-scrim"></div>
        ${s.badge?`<div class="sc-badge ${bc}">${s.badge.toUpperCase()}</div>`:''}
        <div class="sc-views"><i class="fas fa-eye" style="font-size:7px"></i>${s.views}</div>
      </div>
      <a href="bridge.html?id=${s.id}" class="sc-title">${s.title}</a>
      <a href="profile.html?id=${s.authorId}" class="sc-sub">@${s.author}</a>
    </div>`;
  }).join('');
}

/* ── Sort sheet ── */
function openSheet(){document.getElementById('sheetBg').classList.add('open')}
function closeBg(e){if(e.target===e.currentTarget)document.getElementById('sheetBg').classList.remove('open')}
function setSort(el,sort){
  currentSort=sort;
  document.querySelectorAll('.sort-opt').forEach(o=>{o.classList.remove('selected');o.querySelector('.check').textContent=''});
  el.classList.add('selected');el.querySelector('.check').textContent='✓';
  document.getElementById('sheetBg').classList.remove('open');
  document.getElementById('sortBtnEl').classList.add('active');
  currentPage=1;renderGrid();setupStoryList();toast('✅ Sorted!');
}

/* ══════════════════════════════════════════
   STATUS VIEWER — same logic as homepage
══════════════════════════════════════════ */
let statusWriterId=null,statusIdx=0,statusTimer=null,statusPaused=false,statusElapsed=0;
const STATUS_DUR=5000;

function openStatus(wid){
  const ws=WRITER_STATUSES[wid];
  if(!ws||!ws.statuses.length){toast('No status available');return;}
  statusWriterId=wid;statusIdx=0;statusPaused=false;statusElapsed=0;
  document.getElementById('statusWAv').src=ws.avatar;
  document.getElementById('statusWName').textContent='@'+ws.name;
  document.getElementById('statusOv').classList.add('open');
  document.body.style.overflow='hidden';
  renderStatusSlide();
}

function renderStatusSlide(){
  const ws=WRITER_STATUSES[statusWriterId];
  if(!ws)return;
  const slides=ws.statuses;
  const slide=slides[statusIdx];
  statusElapsed=0;statusPaused=false;
  document.getElementById('statusProgBars').innerHTML=slides.map((_,i)=>
    `<div class="spb"><div class="spb-fill" id="spb${i}" style="width:${i<statusIdx?100:0}%"></div></div>`
  ).join('');
  document.getElementById('statusWTime').textContent=slide.time;
  const content=document.getElementById('statusContent');
  content.innerHTML=`
    <div class="status-slide" style="background-image:url('${slide.bg}')">
      <div class="status-slide-grad"></div>
      <div class="status-slide-text">
        <div class="status-slide-quote">${slide.quote}</div>
        <div class="status-slide-caption">${slide.caption}</div>
      </div>
    </div>
    <div class="status-nav-left" id="sNavL"></div>
    <div class="status-nav-right" id="sNavR"></div>`;
  document.getElementById('sNavL').addEventListener('click',()=>statusNav(-1));
  document.getElementById('sNavR').addEventListener('click',()=>statusNav(1));

  const ov=document.getElementById('statusOv');
  if(ov._phStart)ov.removeEventListener('pointerdown',ov._phStart);
  if(ov._phEnd)ov.removeEventListener('pointerup',ov._phEnd);
  ov._phStart=(e)=>{if(e.target.closest('.status-close-btn')||e.target.closest('.status-reply-inp')||e.target.closest('.status-react-btn'))return;pauseStatus();};
  ov._phEnd=()=>resumeStatus();
  ov.addEventListener('pointerdown',ov._phStart);
  ov.addEventListener('pointerup',ov._phEnd);

  clearTimeout(statusTimer);
  requestAnimationFrame(()=>{
    const fill=document.getElementById('spb'+statusIdx);
    if(fill){fill.style.transition=`width ${STATUS_DUR}ms linear`;fill.style.width='100%';}
    statusTimer=setTimeout(()=>statusNav(1),STATUS_DUR);
  });
}

function pauseStatus(){
  if(!statusWriterId||statusPaused)return;
  statusPaused=true;clearTimeout(statusTimer);
  const fill=document.getElementById('spb'+statusIdx);
  if(fill){
    const curW=parseFloat(window.getComputedStyle(fill).width);
    const trackW=fill.parentElement?fill.parentElement.getBoundingClientRect().width:1;
    const pct=trackW>0?(curW/trackW*100):0;
    statusElapsed=(pct/100)*STATUS_DUR;
    fill.style.transition='none';fill.style.width=pct+'%';
  }
}
function resumeStatus(){
  if(!statusWriterId||!statusPaused)return;
  statusPaused=false;
  const remaining=Math.max(0,STATUS_DUR-statusElapsed);
  const fill=document.getElementById('spb'+statusIdx);
  if(fill){fill.style.transition=`width ${remaining}ms linear`;fill.style.width='100%';}
  clearTimeout(statusTimer);
  statusTimer=setTimeout(()=>statusNav(1),remaining);
}
function statusNav(dir){
  const ws=WRITER_STATUSES[statusWriterId];
  if(!ws)return;
  clearTimeout(statusTimer);statusPaused=false;statusElapsed=0;
  statusIdx+=dir;
  if(statusIdx<0||statusIdx>=ws.statuses.length){closeStatus();return;}
  renderStatusSlide();
}
function closeStatus(){
  clearTimeout(statusTimer);statusPaused=false;
  const ov=document.getElementById('statusOv');
  if(ov._phStart)ov.removeEventListener('pointerdown',ov._phStart);
  if(ov._phEnd)ov.removeEventListener('pointerup',ov._phEnd);
  ov.classList.remove('open');
  document.body.style.overflow='';
  // Mark as viewed — turn border to dim gray
  if(statusWriterId&&WRITER_STATUSES[statusWriterId]){
    WRITER_STATUSES[statusWriterId].viewed=true;
  }
  statusWriterId=null;
  // Re-render writers row to reflect updated border color
  renderWritersRow();
}

setupStoryList();
</script>
